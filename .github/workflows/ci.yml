name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Lint & test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pandas numpy scikit-learn pyyaml pyarrow
      - name: Lint (ruff)
        run: ruff check . --exclude dashboard
      - name: Feature self-check
        run: python features.py
      - name: Unit tests
        run: pytest -q

  dashboard:
    name: Build dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
